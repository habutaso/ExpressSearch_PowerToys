name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Plugin
        run: dotnet publish -c Release -o ./publish /p:UseAppHost=false

      - name: Clean up and Package ZIP
        shell: pwsh
        run: |
          Remove-Item -Path ./publish -Recurse -Include *.xml, *.pdb, PowerToys.*, Wox.*, Microsoft.*, WinRT.*

          $pluginName = "ExpressSearch"
          New-Item -ItemType Directory -Path "./staging/$pluginName" -Force | Out-Null
          Copy-Item -Path "./publish/*" -Destination "./staging/$pluginName" -Recurse -Force

          Copy-Item -Path "./settings.json" -Destination "./staging/$pluginName/" -Force

          $tagName = "${{ github.ref_name }}"
          if ($tagName -eq "") { $tagName = "manual" }
          $zipName = "${pluginName}-${tagName}.zip"
          
          Compress-Archive -Path "./staging/$pluginName" -DestinationPath $zipName
          
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true